name: Build PearlFortune Telemetry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile.pearlfortune-telemetry
      - miner-telemetry-sampler.sh
      - pearlfortune-telemetry-entrypoint.sh
      - .github/workflows/build-pearlfortune-telemetry-ghcr.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/salad-prl-pearlfortune-miner
          tags: |
            type=raw,value=v1.2.4-telemetry
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pearlfortune-telemetry
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
